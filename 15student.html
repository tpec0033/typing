<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>順安國中 文章速打測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f3ee;
  --bg2: #ede8e0;
  --panel: #ffffff;
  --panel2: #faf7f3;
  --border: #ddd5c8;
  --border2: #b8a898;
  --text: #2a1e14;
  --muted: #8a7868;
  --dim: #6a5848;
  --accent: #1a73c8;
  --green: #1a8050;
  --red: #c8341e;
  --gold: #b87010;
  --glow-blue: 0 2px 16px rgba(26,115,200,0.2);
  --glow-green: 0 2px 12px rgba(26,128,80,0.2);
  --glow-red: 0 2px 12px rgba(200,52,30,0.2);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 120% 60% at 50% -5%, rgba(200,52,30,0.04) 0%, transparent 55%),
    url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c8a888' fill-opacity='0.035'%3E%3Cpath d='M0 0h40v1H0zM0 20h40v1H0z'/%3E%3C/g%3E%3C/svg%3E");
}

/* ── 頂欄 ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 28px;
  background: #2a1e14;
  border-bottom: 3px solid var(--red);
  position: sticky;
  top: 0;
  z-index: 50;
  gap: 16px;
  flex-wrap: wrap;
  box-shadow: 0 2px 16px rgba(42,30,20,0.18);
}

.logo {
  font-family: 'Orbitron', monospace;
  font-size: 0.85rem;
  font-weight: 900;
  color: #f5ece4;
  letter-spacing: 0.2em;
  white-space: nowrap;
  text-shadow: 0 1px 8px rgba(200,52,30,0.3);
}

.topbar-stats {
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}

.top-stat {
  text-align: center;
  min-width: 60px;
}

.top-stat-label {
  font-size: 0.58rem;
  letter-spacing: 0.18em;
  color: #b8a898;
  text-transform: uppercase;
  display: block;
  margin-bottom: 2px;
}

.top-stat-val {
  font-family: 'Orbitron', monospace;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}

.top-stat-val.green { color: var(--green); text-shadow: var(--glow-green); }
.top-stat-val.gold  { color: var(--gold); }

/* 大倒數 */
.big-timer {
  font-family: 'Orbitron', monospace;
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--accent);
  text-shadow: var(--glow-blue);
  letter-spacing: 0.08em;
  transition: color 0.3s;
}

.big-timer.warn { color: var(--gold); text-shadow: 0 0 20px rgba(255,213,79,0.5); animation: pulse 1s ease-in-out infinite; }
.big-timer.danger { color: var(--red); text-shadow: var(--glow-red); animation: pulse 0.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }

.btn-end-top {
  padding: 8px 18px;
  border-radius: 4px;
  border: 1px solid rgba(255,83,112,0.5);
  background: rgba(255,83,112,0.1);
  color: var(--red);
  font-family: 'Orbitron', monospace;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-end-top:hover { background: rgba(255,83,112,0.22); box-shadow: var(--glow-red); }

/* ── 頁面區塊 ── */
.page { display: none; }
.page.active { display: block; }

/* ─────────────────────────────────
   選文章頁
───────────────────────────────── */
#selectPage {
  max-width: 700px;
  margin: 0 auto;
  padding: 40px 20px;
}

.select-hero {
  text-align: center;
  margin-bottom: 36px;
}

.select-hero h2 {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1.2rem, 4vw, 1.8rem);
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 0.15em;
  margin-bottom: 8px;
}

.select-hero p {
  font-size: 0.82rem;
  color: var(--muted);
  letter-spacing: 0.1em;
}

.article-cards { display: flex; flex-direction: column; gap: 12px; }

.article-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px 22px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 16px;
  position: relative;
  overflow: hidden;
}

.article-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.2s;
}

.article-card:hover {
  border-color: var(--accent);
  background: #ddeef8;
  transform: translateX(4px);
}

.article-card:hover::before { opacity: 1; }

.card-num {
  font-family: 'Orbitron', monospace;
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--border2);
  min-width: 36px;
  text-align: center;
  flex-shrink: 0;
}

.article-card:hover .card-num { color: var(--accent); }

.card-info { flex: 1; }

.card-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}

.card-preview {
  font-size: 0.77rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 400px;
}

.card-lines {
  font-size: 0.68rem;
  color: var(--dim);
  font-family: 'Share Tech Mono', monospace;
  flex-shrink: 0;
  text-align: right;
}

/* ─────────────────────────────────
   打字練習頁
───────────────────────────────── */
#typingPage {
  max-width: 860px;
  margin: 0 auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* 文章標題列 */
.article-title-bar {
  display: flex;
  align-items: center;
  gap: 14px;
}

.article-title-bar h2 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  flex: 1;
  padding: 6px 12px;
  background: #fff;
  border-radius: 8px;
  border: 1px solid #e0d5c8;
}

.btn-back {
  padding: 6px 14px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--dim);
  font-size: 0.75rem;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.15s;
}
.btn-back:hover { border-color: var(--accent); color: var(--accent); }

/* ── 主體：目標行 + 輸入行 並排 ── */
.typing-arena {
  background: var(--panel);
  border: none;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 28px rgba(42,30,20,0.14), 0 1px 4px rgba(42,30,20,0.08);
}

/* 已完成行區 */
.done-lines {
  padding: 10px 20px 0;
  background: #faf7f3;
  border-bottom: 1px solid #ede5d8;
}

.done-line-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
  opacity: 0.5;
  font-size: 1.05rem;
  line-height: 1.7;
  letter-spacing: 0.04em;
}

.done-line-row .col-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem;
  color: #b8a898;
  width: 28px;
  flex-shrink: 0;
  letter-spacing: 0.05em;
  text-align: center;
  background: #ede5d8;
  border-radius: 3px;
  padding: 1px 0;
}

.done-chars { white-space: nowrap; overflow: hidden; color: #6a5848; }

.char-ok { color: #1a9060; font-weight:600; }
.char-err { color: var(--red); background: rgba(224,48,80,0.10); border-radius: 2px; }

/* 分隔線 */
.arena-divider {
  height: 1px;
  background: var(--border);
  margin: 0 20px;
}

/* 當前行區域 */
.current-area {
  padding: 12px 20px 16px;
  background: #fff;
}

.current-line-label {
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: var(--red);
  text-transform: uppercase;
  margin-bottom: 10px;
  font-family: 'Share Tech Mono', monospace;
  display: flex;
  align-items: center;
  gap: 8px;
}
.current-line-label::before {
  content: '';
  display: inline-block;
  width: 18px;
  height: 2px;
  background: var(--red);
  border-radius: 1px;
}

/* ══════════════════════════════════
   對照框 — 目標（上）/ 輸入（下）
   確保完全對齊的關鍵：
   兩排使用完全相同的字體、大小、
   padding、line-height、word-break
   ══════════════════════════════════ */

/* 共用字型變數（CSS 變數方便統一管理） */
:root {
  --type-font: 'Noto Sans TC', sans-serif;
  --type-size: 1.45rem;
  --type-lh:   2.1;
  --type-ls:   0.04em;
  --type-pad:  14px 16px;
  --label-w:   52px;
}

.typing-pair {
  border: none;
  border-radius: 0;
  overflow: hidden;
}

/* 左側標籤 */
.row-label {
  width: var(--label-w);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', monospace;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: #fff;
  user-select: none;
  writing-mode: horizontal-tb;
}

/* ── 目標行 ── */
.target-row {
  display: flex;
  align-items: stretch;
  background: #fdf0ec;
  border-bottom: 2px dashed #e8c0b0;
}

.target-row .row-label { background: linear-gradient(180deg, #c0392b, #a0291b); letter-spacing: 0.08em; }

/* row-content defined in tc section above */

/* 目標字著色 */
.tc {
  position: relative;
  color: #c0392b;
  font-weight: 500;
  line-height: 1.2;
}
.tc.t-done   { color: #dda898; }
.tc.t-cursor { color: #96200e; font-weight: 900; }
.tc.t-ahead  { color: #e8c0b8; }
.tc.t-skipped {
  color: #fff;
  background: #c0392b;
  border-radius: 3px;
  padding: 0 1px;
  font-size: 0.75em;
}
.tc.t-skipped::after { display: none; }
.tc.t-cursor::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0; right: 0;
  height: 3px;
  background: #c0392b;
  border-radius: 2px;
  animation: blink-cur 0.75s step-end infinite;
}
@keyframes blink-cur { 0%,100%{opacity:1}50%{opacity:0} }

/* 目標行 */
.row-content {
  flex: 1;
  font-family: var(--type-font);
  font-size: var(--type-size);
  line-height: var(--type-lh);
  letter-spacing: var(--type-ls);
  padding: 14px 20px;
  white-space: nowrap;
  overflow: hidden;
  min-height: 66px;
  display: flex;
  align-items: center;
}

/* ── 輸入行 ── */
.input-row-wrap {
  display: flex;
  align-items: stretch;
  background: #f4faf7;
  position: relative;
}

.input-row-wrap .row-label { background: linear-gradient(180deg, #27ae60, #1a8848); letter-spacing: 0.08em; }

/* textarea：與目標行完全相同的字型設定 */
.type-input {
  flex: 1;
  font-family: var(--type-font);
  font-size: var(--type-size);
  line-height: var(--type-lh);
  letter-spacing: var(--type-ls);
  padding: 14px 90px 14px 20px;
  white-space: nowrap;
  overflow: hidden;
  min-height: 60px;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  color: #1a3a2a;
  caret-color: #27ae60;
  overflow: hidden;
}

.type-input::placeholder {
  color: #a8c8b8;
  font-size: 1rem;
}

.enter-hint {
  position: absolute;
  right: 10px;
  bottom: 10px;
  font-size: 0.62rem;
  color: #80a898;
  font-family: 'Share Tech Mono', monospace;
  pointer-events: none;
  white-space: nowrap;
  line-height: 1;
}

/* 跳過提示列 */
.skip-hint-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  background: #2a1e14;
  font-size: 0.7rem;
  color: #c8a888;
  font-family: 'Noto Sans TC', sans-serif;
}
.skip-hint-bar .skip-key {
  display: inline-flex;
  align-items: center;
  background: #3d2d1e;
  color: #f0d8b8;
  border: 1px solid #6a4828;
  border-radius: 5px;
  padding: 2px 9px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.72rem;
  font-weight: 700;
  white-space: nowrap;
  box-shadow: 0 2px 0 #1a0e08;
}
.skip-hint-bar .skip-count {
  margin-left: auto;
  font-family: 'Share Tech Mono', monospace;
  color: #f08060;
  font-weight: 700;
  font-size: 0.72rem;
}

/* 行進度 */
.line-progress {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 20px 10px;
  background: #faf7f3;
  border-top: 1px solid #ede5d8;
}

.lp-text {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  white-space: nowrap;
}

.lp-bar {
  flex: 1;
  height: 5px;
  background: #ede5d8;
  border-radius: 99px;
  overflow: hidden;
}

.lp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red), #e87050);
  border-radius: 99px;
  transition: width 0.3s ease;
}

/* ── 待打行預覽 ── */
.upcoming-lines {
  background: #f8fafd;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 20px;
}

.upcoming-label {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
  font-family: 'Share Tech Mono', monospace;
}

.upcoming-line {
  font-size: 1.05rem;
  color: var(--border2);
  line-height: 1.8;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.upcoming-line:first-of-type { color: var(--dim); }

/* ─────────────────────────────────
   結果頁
───────────────────────────────── */
#resultPage {
  max-width: 680px;
  margin: 0 auto;
  padding: 40px 20px 60px;
  text-align: center;
}

.result-card {
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 8px 40px rgba(26,115,200,0.13);
  padding: 36px 32px 32px;
  margin-bottom: 24px;
}

.result-school {
  font-size: 0.7rem;
  letter-spacing: 0.25em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.result-headline {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1.1rem, 3vw, 1.5rem);
  font-weight: 900;
  color: var(--ink);
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}

.result-subtitle {
  font-size: 0.82rem;
  color: var(--muted);
  margin-bottom: 28px;
}

.result-article-name {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--accent);
  background: #e8f2fb;
  display: inline-block;
  padding: 4px 16px;
  border-radius: 20px;
  margin-bottom: 28px;
}

/* 時間單獨一行大顯示 */
.result-time-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px dashed var(--border);
}

.result-time-icon { font-size: 1.6rem; }

.result-time-val {
  font-family: 'Orbitron', monospace;
  font-size: 2.4rem;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 0.08em;
  line-height: 1;
}

.result-time-lbl {
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.12em;
  margin-top: 2px;
}

/* 4 格統計 */
.result-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 0;
}

@media (max-width: 560px) { .result-stats { grid-template-columns: repeat(2, 1fr); } }

.stat-cell {
  border-radius: 12px;
  padding: 18px 10px 14px;
  position: relative;
  overflow: hidden;
}

.stat-cell::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 12px 12px 0 0;
}

.stat-cell.s-correct { background: #f0faf4; }
.stat-cell.s-correct::before { background: var(--green); }

.stat-cell.s-wrong { background: #fff0f2; }
.stat-cell.s-wrong::before { background: var(--red); }

.stat-cell.s-skip { background: #fff8e8; }
.stat-cell.s-skip::before { background: var(--gold); }

.stat-cell.s-wpm { background: #f3eeff; }
.stat-cell.s-wpm::before { background: #7b2fa0; }

.stat-cell.s-acc { background: #e8f2fb; }
.stat-cell.s-acc::before { background: var(--accent); }

.stat-icon { font-size: 1.3rem; margin-bottom: 6px; }

.stat-num {
  font-family: 'Orbitron', monospace;
  font-size: 1.7rem;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-cell.s-correct .stat-num { color: var(--green); }
.stat-cell.s-wrong   .stat-num { color: var(--red); }
.stat-cell.s-skip    .stat-num { color: #c07a00; }
.stat-cell.s-wpm     .stat-num { color: #7b2fa0; }
.stat-cell.s-acc     .stat-num { color: var(--accent); }

.stat-lbl {
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.1em;
}

/* 正確率大橫條 */
.acc-bar-wrap {
  margin: 24px 0 0;
  text-align: left;
}

.acc-bar-head {
  display: flex;
  justify-content: space-between;
  font-size: 0.72rem;
  color: var(--muted);
  margin-bottom: 6px;
  letter-spacing: 0.08em;
}

.acc-bar-track {
  height: 10px;
  background: #e8eef5;
  border-radius: 99px;
  overflow: hidden;
}

.acc-bar-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 1s cubic-bezier(.2,.8,.3,1);
  background: linear-gradient(90deg, var(--green), #00c8a0);
}

/* 按鈕 */
.result-btns {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-retry {
  padding: 13px 32px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, var(--accent), #0060b0);
  color: #fff;
  font-family: 'Orbitron', monospace;
  font-weight: 700;
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(26,115,200,0.3);
}

.btn-retry:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,115,200,0.4); }

.btn-choose {
  padding: 13px 32px;
  border-radius: 8px;
  border: 1.5px solid var(--border2);
  background: transparent;
  color: var(--dim);
  font-family: 'Orbitron', monospace;
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-choose:hover { border-color: var(--accent); color: var(--accent); }

/* ── 其他 ── */
.hidden { display: none !important; }

/* 姓名輸入 */
.name-box {
  max-width: 460px;
  margin: 0 auto 20px;
}
.name-box-inner {
  background: #fff;
  border: 2px solid var(--accent);
  border-radius: 12px;
  padding: 20px 24px;
  box-shadow: 0 4px 16px rgba(26,115,200,0.12);
}
.name-label {
  display: block;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.name-row {
  display: flex;
  gap: 10px;
}
.name-input {
  flex: 1;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 1.1rem;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  outline: none;
  color: var(--ink);

<script>
// ══════════════════════════════════════════
//  資料初始化
// ══════════════════════════════════════════
let ARTICLES = [];
let DEFAULT_TIMER = 10;
let GAS_URL = window.__GAS_URL__ || 'https://script.google.com/macros/s/AKfycbwgDntJabp9bATOjukgmcnlhzQyD8MuXSzOE7NlTTq8pTbYYJL_Aru03AVBH9vRi93l/exec'; // Google Apps Script 網址
let studentName = '';

function initData() {
  // 1. 優先從 URL hash 讀（老師產生的連結）
  const hash = location.hash;
  if (hash.startsWith('#data=')) {
    try {
      const raw = decodeURIComponent(escape(atob(hash.slice(6))));
      const d = JSON.parse(raw);
      ARTICLES = d.articles || [];
      DEFAULT_TIMER = d.timer ?? 10;
      return;
    } catch(e) { console.warn('hash parse error', e); }
  }

  // 2. 從 window.__ARTICLES__（下載版嵌入）
  if (window.__ARTICLES__) {
    ARTICLES = window.__ARTICLES__;
    DEFAULT_TIMER = window.__DEFAULT_TIMER__ ?? 10;
    return;
  }

  // 3. 預設示範文章
  ARTICLES = [
    {
      title: '示範文章一：春天的早晨',
      content: '春風和煦，百花齊放，大地一片生機盎然。\n遠處山巒起伏，雲霧繚繞，景色如詩如畫。\n小溪流水潺潺，清澈見底，魚兒自由自在。\n鳥兒在枝頭歌唱，歌聲悅耳動聽，令人心曠神怡。\n這美好的一天，讓人忘卻一切煩憂，沉浸於自然之中。'
    },
    {
      title: '示範文章二：科技的力量',
      content: '科技改變了人類生活的方式，讓世界更加緊密相連。\n網際網路的出現，使資訊傳遞瞬間完成。\n人工智慧正在各個領域展現驚人的潛力。\n我們站在時代的浪潮之上，迎接每一個挑戰。\n唯有不斷學習，才能跟上這個快速變化的世界。'
    }
  ];
}

// ══════════════════════════════════════════
//  狀態
// ══════════════════════════════════════════
let chosenTimer = 10;
let currentArticle = null;
let lines = [];
let currentLine = 0;
let doneData = [];   // [{ typed, targetLen, correct }]
let totalCorrect = 0;
let totalWrong = 0;
let totalTyped = 0;
let startTime = null;
let elapsedSec = 0;
let ticker = null;
let running = false;

// ══════════════════════════════════════════
//  選文章頁
// ══════════════════════════════════════════
function buildSelectPage() {
  chosenTimer = DEFAULT_TIMER;

  const cards = document.getElementById('articleCards');
  cards.innerHTML = ARTICLES.map((a, i) => {
    const preview = a.content.split('\n')[0];
    const lineCount = a.content.split('\n').filter(l=>l.trim()).length;
    const charCount = a.content.split('\n').filter(l=>l.trim()).join('').length;
    return `
    <div class="article-card fade-in" style="animation-delay:${i*0.06}s" onclick="selectArticleGuard(${i})">
      <div class="card-num">${String(i+1).padStart(2,'0')}</div>
      <div class="card-info">
        <div class="card-title">${escHtml(a.title)}</div>
        <div class="card-preview">${escHtml(preview)}</div>
      </div>
      <div class="card-lines">${lineCount} 行 · ${charCount} 字<br><span style="font-size:0.58rem;color:var(--muted)">共 ${charCount} 個字</span></div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
//  開始練習
// ══════════════════════════════════════════
// 計算字元視覺寬度（中文/全形=1，半形=0.5）
function charWidth(ch) {
  return /[\u2E80-\u9FFF\uF900-\uFAFF\uFE30-\uFE4F\uFF00-\uFFEF\u3000-\u303F]/.test(ch) ? 1 : 0.5;
}
// charWeight alias
function charWidth(ch) { return charWeight(ch); }

// ══════════════════════════════════
//  斷行：連續文字流，每 20 中文字一行
//  不補空格，只截斷，滿 20 字就換行
// ══════════════════════════════════
const CHARS_PER_LINE = 20;

function charWeight(ch) {
  return /[⺀-鿿豈-﫿︰-﹏＀-￯　-〿]/.test(ch) ? 1 : 0.5;
}

// 把整篇文章當連續字流，每 maxW 中文字寬切一行
function breakArticle(content, maxW) {
  // 合併所有段落為一個連續字流
  const fullText = content.split('\n').map(l => l.trim()).filter(l => l).join('');
  const lines = [];
  let cur = '', w = 0;
  for (const ch of fullText) {
    const cw = charWeight(ch);
    if (w + cw > maxW && cur.length > 0) {
      lines.push(cur);
      cur = ch;
      w = cw;
    } else {
      cur += ch;
      w += cw;
    }
  }
  if (cur) lines.push(cur);
  return lines;
}

function startArticle(idx) {
  currentArticle = ARTICLES[idx];
  // 把文章當連續字流，每 CHARS_PER_LINE 字一行
  lines = breakArticle(currentArticle.content, CHARS_PER_LINE);
  currentLine = 0;
  doneData = [];
  totalCorrect = 0; totalWrong = 0; totalTyped = 0; elapsedSec = 0;
  enterReady = false;
  isComposing = false;
  skippedPositions = new Set();
  lineSkipCount = 0;
  updateSkipCount(0);

  document.getElementById('practiceTitle').textContent = currentArticle.title;
  const totalChars = lines.join('').length;
  document.getElementById('totalCharBadge').textContent = '共 ' + totalChars + ' 字';

  showPage('typingPage');
  document.getElementById('practiceStats').classList.remove('hidden');

  // 計時設定
  const timerEl = document.getElementById('bigTimer');
  if (chosenTimer > 0) {
    timerEl.textContent = formatTime(chosenTimer * 60);
    timerEl.className = 'big-timer';
  } else {
    timerEl.textContent = '∞';
  }

  document.getElementById('lineVal').textContent = `0/${lines.length}`;

  renderDoneLines();
  renderCurrentLine();
  renderUpcoming();

  const inp = document.getElementById('typeInput');
  inp.value = '';
  inp.disabled = false;
  inp.style.height = 'auto';
  inp.style.background = 'transparent';
  inp.focus();

  // 等待第一次輸入才開始計時
  startTime = null;
  running = true;
  clearInterval(ticker);
}

// ══════════════════════════════════════════
//  計時器
// ══════════════════════════════════════════
function tickTimer() {
  elapsedSec = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('elapsedVal').textContent = formatTime(elapsedSec);

  const timerEl = document.getElementById('bigTimer');
  if (chosenTimer > 0) {
    const rem = chosenTimer * 60 - elapsedSec;
    if (rem <= 0) { endGame(true); return; }
    timerEl.textContent = formatTime(rem);
    timerEl.className = 'big-timer' + (rem <= 30 ? ' danger' : rem <= 60 ? ' warn' : '');
  } else {
    timerEl.textContent = formatTime(elapsedSec);
  }
}

function formatTime(s) {
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// ══════════════════════════════════════════
//  輸入處理
// ══════════════════════════════════════════
function handleInput() {
  if (!running) return;
  if (isComposing) return; // 注音組字中，等確認後再更新
  // 第一次輸入時才開始計時
  if (!startTime) {
    startTime = Date.now();
    ticker = setInterval(tickTimer, 500);
  }
  renderCurrentLine();
  updateStats();
}

// 注音/輸入法組字開始
document.addEventListener('compositionstart', () => {
  isComposing = true;
});

// 注音/輸入法組字結束（確認字後）
document.addEventListener('compositionend', () => {
  isComposing = false;
  if (!running) return;
  // 確認字後才更新
  if (!startTime) {
    startTime = Date.now();
    ticker = setInterval(tickTimer, 500);
  }
  renderCurrentLine();
  updateStats();
});

// 游標移動時也更新目標行游標位置（組字中除外）
document.addEventListener('selectionchange', () => {
  const inp = document.getElementById('typeInput');
  if (document.activeElement === inp && running && !isComposing) {
    renderCurrentLine();
  }
});

let enterReady = false; // 是否已打滿、等待第二次 Enter
let skippedPositions = new Set(); // 記錄被跳過的字位置 "line-charIdx"
let lineSkipCount = 0; // 當前行跳過計數
let isComposing = false; // 是否正在組字（注音/倉頡輸入中）

function handleKey(e) {
  if (!running) return;
  if (e.key === 'Enter') {
    e.preventDefault();
    const inp = document.getElementById('typeInput');
    const typed = inp.value;
    const target = lines[currentLine] || '';
    if (typed.length < target.length) {
      // 未打完：抖動提示
      inp.animate([{transform:'translateX(-4px)'},{transform:'translateX(4px)'},{transform:'translateX(0)'}],{duration:200});
      enterReady = false;
      return;
    }
    if (!enterReady) {
      // 第一次 Enter：標示「再按一次」
      enterReady = true;
      showEnterHint(true);
      return;
    }
    // 第二次 Enter：正式跳行 or 結束
    enterReady = false;
    showEnterHint(false);
    if (currentLine >= lines.length) {
      // 已是最後一行打完後的狀態，直接結束
      endGame(false);
      return;
    }
    submitLine();
  } else if (e.key === 'Tab') {
    // F1 跳過當前游標位置的字（計為錯誤）
    e.preventDefault();
    skipCurrentChar();
  } else {
    // 打字時重置 enterReady（避免打完又繼續打又按）
    if (e.key !== 'Shift' && e.key !== 'Control' && e.key !== 'Alt' && e.key !== 'Meta') {
      enterReady = false;
      showEnterHint(false);
    }
  }
}

function skipCurrentChar() {
  if (!running) return;
  const inp = document.getElementById('typeInput');
  const typed = inp.value;
  const target = lines[currentLine] || '';
  const pos = inp.selectionStart ?? typed.length;

  // 只能跳過「尚未輸入」的游標位置
  if (pos > typed.length) return;
  if (pos >= target.length) return;
  if (isPunct(target[pos])) return; // 標點不需跳過

  // 在游標位置插入特殊佔位符（半形空格，視覺上不顯示）
  const before = typed.slice(0, pos);
  const after  = typed.slice(pos);
  const newVal = before + ' ' + after; // 空白佔位
  inp.value = newVal;

  // 記錄此位置為跳過
  skippedPositions.add(currentLine + '-' + pos);
  lineSkipCount++;
  updateSkipCount(lineSkipCount);

  // 移動游標到下一個字
  inp.setSelectionRange(pos + 1, pos + 1);

  renderCurrentLine();
  updateStats();
}

function updateSkipCount(n) {
  const el = document.getElementById('skipCount');
  const num = document.getElementById('skipNum');
  if (!el || !num) return;
  if (n > 0) {
    el.style.display = '';
    num.textContent = n;
  } else {
    el.style.display = 'none';
  }
}

function showEnterHint(ready) {
  const hint = document.getElementById('enterHint');
  if (!hint) return;
  if (ready) {
    hint.textContent = '✔ 再按一次 ↵ 換下一行';
    hint.style.color = 'var(--green)';
    hint.style.fontWeight = '700';
  } else {
    hint.textContent = '打完按 ↵ Enter';
    hint.style.color = '';
    hint.style.fontWeight = '';
  }
}

function submitLine() {
  const inp = document.getElementById('typeInput');
  const typed = inp.value;
  const target = lines[currentLine];

  // 長度檢查（保險用，正常從 handleKey 進來時已確保打滿）
  if (typed.length < target.length) return;

  // 統計（排除標點符號）
  let correct = 0, wrong = 0;
  for (let i = 0; i < target.length; i++) {
    if (isPunct(target[i])) continue; // 標點不計
    if (typed[i] === target[i]) correct++;
    else wrong++;
  }
  // 多打的字（超出目標長度的部分）不計入
  totalCorrect += correct;
  totalWrong += wrong;
  totalTyped += target.length;
  doneData.push({ typed, target, correct });

  currentLine++;
  inp.value = '';
  inp.style.height = 'auto';
  lineSkipCount = 0;
  updateSkipCount(0);

  if (currentLine >= lines.length) {
    // 最後一行打完：顯示完成提示，等第二次 Enter 或按結束
    renderDoneLines();
    showFinishHint();
    inp.disabled = true;
    return;
  }

  renderDoneLines();
  renderCurrentLine();
  renderUpcoming();
  updateStats();
  showEnterHint(false);
  inp.focus();
}

function showFinishHint() {
  // 把 enter-hint 改成完成提示
  const hint = document.getElementById('enterHint');
  if (hint) {
    hint.textContent = '🎉 全部完成！再按 ↵ Enter 查看成績';
    hint.style.color = 'var(--green)';
    hint.style.fontWeight = '700';
    hint.style.fontSize = '0.72rem';
  }
  // 輸入行改變外觀
  const wrap = document.getElementById('typeInput');
  if (wrap) wrap.style.background = '#eafaf2';
}

// ══════════════════════════════════════════
//  渲染
// ══════════════════════════════════════════
function renderDoneLines() {
  const container = document.getElementById('doneLines');
  if (doneData.length === 0) { container.innerHTML = ''; return; }

  // 只顯示最後 2 行已完成的
  const recent = doneData.slice(-2);
  container.innerHTML = recent.map(d => {
    // 已完成行：不顯示對錯，一律正常顯示目標文字
    const chars = d.target.split('').map(ch =>
      `<span>${escHtml(ch)}</span>`
    ).join('');
    return `<div class="done-line-row">
      <span class="col-label">✓</span>
      <span class="done-chars">${chars}</span>
    </div>`;
  }).join('');
}

function renderCurrentLine() {
  const target = lines[currentLine] || '';
  const inp = document.getElementById('typeInput');
  const typed = inp.value;
  const cursorPos = inp.selectionStart ?? typed.length;
  const row = document.getElementById('targetRow');

  // 目標行：標示游標位置，跳過的字特別標記
  let html = '';
  target.split('').forEach((ch, i) => {
    let cls;
    if (i < typed.length) {
      // 判斷是否為跳過字（輸入了特殊佔位符）
      cls = skippedPositions.has(currentLine + '-' + i) ? 't-skipped' : 't-done';
    }
    else if (i === cursorPos) cls = 't-cursor';
    else cls = 't-ahead';
    html += `<span class="tc ${cls}">${escHtml(ch)}</span>`;
  });
  row.innerHTML = html;

  // 固定單行高度，由 CSS min-height 控制，不需動態調整
}

function renderUpcoming() {
  const upcoming = lines.slice(currentLine + 1, currentLine + 4);
  const wrap = document.getElementById('upcomingLines');
  if (upcoming.length === 0) {
    document.getElementById('upcomingWrap').style.display = 'none';
    return;
  }
  document.getElementById('upcomingWrap').style.display = '';
  wrap.innerHTML = upcoming.map((l, i) =>
    `<div class="upcoming-line" style="opacity:${1 - i*0.3}">${escHtml(l)}</div>`
  ).join('');
}

function updateStats() {
  const target = lines[currentLine] || '';
  const typed = document.getElementById('typeInput').value;

  // 目前行即時統計（排除標點符號）
  let curCorrect = 0, curWrong = 0;
  for (let i = 0; i < Math.min(typed.length, target.length); i++) {
    if (isPunct(target[i])) continue;
    if (typed[i] === target[i]) curCorrect++;
    else curWrong++;
  }

  const tc = totalCorrect + curCorrect;
  const tw = totalWrong + curWrong;
  const typed_total = tc + tw;

  // 正確率 = 正確字 / (正確+錯誤) * 100
  const acc = typed_total > 0 ? Math.round(tc / typed_total * 100) : 100;

  // 每分鐘字數 = 正確字 / 已用秒數 * 60
  const wpm = elapsedSec > 0 ? Math.round(tc / elapsedSec * 60) : 0;

  document.getElementById('elapsedVal').textContent = typed_total;
  document.getElementById('correctVal').textContent = tc;
  document.getElementById('accVal').textContent = acc + '%';
  document.getElementById('wpmVal').textContent = wpm;
  document.getElementById('lineVal').textContent = `${currentLine}/${lines.length}`;

  const pct = (currentLine / lines.length * 100).toFixed(0);
  document.getElementById('lpFill').style.width = pct + '%';
  document.getElementById('lpText').textContent = `${currentLine} / ${lines.length} 行完成`;
}

// ══════════════════════════════════════════
//  結束
// ══════════════════════════════════════════
function endEarly() { if (running) endGame(false); }

function endGame(timeUp) {
  running = false;
  clearInterval(ticker);

  // 把當前行未提交的也計入（排除標點符號）
  const inp = document.getElementById('typeInput');
  const typed = inp.value;
  if (typed && currentLine < lines.length) {
    const target = lines[currentLine];
    let partCorrect = 0, partWrong = 0;
    for (let i = 0; i < Math.min(typed.length, target.length); i++) {
      if (isPunct(target[i])) continue;
      if (typed[i] === target[i]) partCorrect++;
      else partWrong++;
    }
    totalCorrect += partCorrect;
    totalWrong += partWrong;
  }

  // 文章非標點總字數
  const allText = lines.join('');
  const nonPunctTotal = allText.split('').filter(ch => !isPunct(ch)).length;
  // 已打非標點字數（正確＋錯誤）
  const typed_total = totalCorrect + totalWrong;
  // 未打字數 = 非標點總字數 - 已打非標點字數
  const skipped = Math.max(0, nonPunctTotal - typed_total);
  // 正確率 = 正確 / (正確+錯誤) * 100
  const acc = typed_total > 0 ? Math.round(totalCorrect / typed_total * 100) : 0;
  // 每分鐘字數 = 正確字 / 秒數 * 60
  const wpm = elapsedSec > 0 ? Math.round(totalCorrect / elapsedSec * 60) : 0;

  // 顯示
  const isTimeUp = timeUp;
  document.getElementById('resultTitle').textContent = isTimeUp ? '時間到！' : '練習完成！';
  document.getElementById('resultEmoji').textContent = isTimeUp
    ? '⏰ 時間結束，以下是你的成績'
    : '🎉 恭喜完成本次測驗';
  document.getElementById('resArticleName').textContent = currentArticle ? currentArticle.title : '';
  document.getElementById('resTime').textContent = formatTime(elapsedSec);
  document.getElementById('resChars').textContent = totalCorrect;
  document.getElementById('resWrong').textContent = totalWrong;
  document.getElementById('resSkip').textContent = skipped;
  document.getElementById('resAcc').textContent = acc + '%';
  document.getElementById('resWpm').textContent = wpm;

  // 正確率橫條（延遲動畫）
  const accColor = acc >= 90 ? 'linear-gradient(90deg,var(--green),#00c8a0)'
                 : acc >= 70 ? 'linear-gradient(90deg,#e8a010,#f0c030)'
                 : 'linear-gradient(90deg,var(--red),#ff8060)';
  document.getElementById('resAcc').style.color =
    acc >= 90 ? 'var(--green)' : acc >= 70 ? '#c07a00' : 'var(--red)';
  setTimeout(() => {
    const fill = document.getElementById('accBarFill');
    fill.style.background = accColor;
    fill.style.width = acc + '%';
  }, 300);

  document.getElementById('practiceStats').classList.add('hidden');

  // 隱藏上傳狀態（重置）
  document.getElementById('uploadStatus').style.display = 'none';

  showPage('resultPage');

  // 自動上傳成績
  const now = new Date();
  const dateStr = now.getFullYear() + '/' +
    String(now.getMonth()+1).padStart(2,'0') + '/' +
    String(now.getDate()).padStart(2,'0');
  const timeStr2 = String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0');

  uploadScore({
    name: studentName || '（未填姓名）',
    article: currentArticle ? currentArticle.title : '',
    date: dateStr,
    time: timeStr2,
    duration: formatTime(elapsedSec),
    correct: totalCorrect,
    wrong: totalWrong,
    skipped: skipped,
    acc: acc + '%',
    wpm: wpm,
    finished: timeUp ? '未完成（時間到）' : '完成'
  });
}

// ══════════════════════════════════════════
//  導航
// ══════════════════════════════════════════
// ── 姓名 ──
function onNameInput() {
  const v = document.getElementById('nameInput').value.trim();
  const hint = document.getElementById('nameHint');
  if (v.length > 0) {
    hint.textContent = '✔ 準備好了！按「確認」開始選文章';
    hint.className = 'name-hint ok';
  } else {
    hint.textContent = '輸入姓名後才能開始練習';
    hint.className = 'name-hint';
  }
}

function confirmName() {
  const v = document.getElementById('nameInput').value.trim();
  if (!v) {
    const hint = document.getElementById('nameHint');
    hint.textContent = '⚠ 請輸入姓名才能繼續';
    hint.className = 'name-hint err';
    document.getElementById('nameInput').focus();
    return;
  }
  studentName = v;
  document.getElementById('nameBox').classList.add('hidden');
  const conf = document.getElementById('nameConfirmed');
  conf.classList.remove('hidden');
  document.getElementById('nameDisplay').textContent = v;
}

function changeName() {
  studentName = '';
  document.getElementById('nameConfirmed').classList.add('hidden');
  document.getElementById('nameBox').classList.remove('hidden');
  document.getElementById('nameHint').textContent = '輸入姓名後才能開始練習';
  document.getElementById('nameHint').className = 'name-hint';
}

// ── 攔截文章點擊，未填姓名則提示 ──
function selectArticleGuard(idx) {
  if (!studentName) {
    const hint = document.getElementById('nameHint');
    hint.textContent = '⚠ 請先輸入姓名！';
    hint.className = 'name-hint err';
    document.getElementById('nameInput').focus();
    // 搖晃 nameBox
    const box = document.getElementById('nameBox');
    box.animate([{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:250});
    return;
  }
  startArticle(idx);
}

// ── 上傳成績到 Google Sheets ──
function uploadScore(data) {
  if (!GAS_URL) {
    setUploadStatus('skip', '（未設定上傳網址，成績僅顯示於畫面）');
    return;
  }
  setUploadStatus('loading', '正在上傳成績…');
  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(() => {
    setUploadStatus('ok', '✅ 成績已成功上傳到 Google 試算表！');
  })
  .catch(err => {
    setUploadStatus('err', '❌ 上傳失敗，請告知老師（' + err.message + '）');
  });
}

function setUploadStatus(type, msg) {
  const box = document.getElementById('uploadStatus');
  const icon = document.getElementById('uploadIcon');
  const msgEl = document.getElementById('uploadMsg');
  box.style.display = 'block';
  if (type === 'loading') { icon.textContent = '⏳'; msgEl.className = 'upload-msg'; }
  else if (type === 'ok')  { icon.textContent = '☁️'; msgEl.className = 'upload-msg ok'; }
  else if (type === 'err') { icon.textContent = '⚠️'; msgEl.className = 'upload-msg err'; }
  else { icon.textContent = 'ℹ️'; msgEl.className = 'upload-msg'; box.style.background = '#f8f8f8'; }
  msgEl.textContent = msg;
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  el.classList.add('active');
}

function goSelect() {
  running = false;
  clearInterval(ticker);
  document.getElementById('practiceStats').classList.add('hidden');
  showPage('selectPage');
  buildSelectPage();
  // 若已有姓名則保留確認狀態
  if (studentName) {
    document.getElementById('nameBox').classList.add('hidden');
    document.getElementById('nameConfirmed').classList.remove('hidden');
    document.getElementById('nameDisplay').textContent = studentName;
  }
}

function retry() {
  const idx = ARTICLES.indexOf(currentArticle);
  startArticle(idx < 0 ? 0 : idx);
}

// ══════════════════════════════════════════
//  工具
// ══════════════════════════════════════════



// ── 標點符號判斷（中英文標點皆排除）──
function isPunct(ch) {
  return /[\u3000-\u303F\uFF00-\uFFEF\u2000-\u206F，。！？；：「」『』【】〔〕、…—～·""''《》〈〉｛｝｜\\\\.,!?;:\'"\/\-\(\)\[\]{}@#$%^&*+=<>~`]/.test(ch);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════
//  啟動
// ══════════════════════════════════════════
initData();
buildSelectPage();
</script>
