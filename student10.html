<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>順安國中 文章速打測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --panel: #ffffff;
  --border: #c2d0e0;
  --border2: #90aac8;
  --text: #1a2a3a;
  --muted: #607080;
  --dim: #4a6080;
  --accent: #1a73c8;
  --green: #1aa060;
  --red: #e03050;
  --gold: #d4860a;
  --glow-blue: 0 2px 12px rgba(26,115,200,0.25);
  --glow-green: 0 2px 12px rgba(26,160,96,0.25);
  --glow-red: 0 2px 10px rgba(224,48,80,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(26,115,200,0.06) 0%, transparent 60%);
}

/* ── 頂欄 ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 28px; background: #fff; border-bottom: 2px solid var(--accent);
  position: sticky; top: 0; z-index: 50; gap: 16px; flex-wrap: wrap;
}
.logo { font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 900; color: var(--accent); letter-spacing: 0.2em; white-space: nowrap; }
.topbar-stats { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
.top-stat { text-align: center; min-width: 60px; }
.top-stat-label { font-size: 0.58rem; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 2px; }
.top-stat-val { font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 700; color: var(--accent); line-height: 1; }
.top-stat-val.green { color: var(--green); }
.top-stat-val.gold  { color: var(--gold); }
.big-timer { font-family: 'Orbitron', monospace; font-size: 1.5rem; font-weight: 900; color: var(--accent); letter-spacing: 0.08em; transition: color 0.3s; }
.big-timer.warn   { color: var(--gold); animation: pulse 1s ease-in-out infinite; }
.big-timer.danger { color: var(--red);  animation: pulse 0.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
.btn-end-top { padding: 8px 18px; border-radius: 4px; border: 1px solid rgba(224,48,80,0.5); background: rgba(224,48,80,0.1); color: var(--red); font-family: 'Orbitron', monospace; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.btn-end-top:hover { background: rgba(224,48,80,0.22); }

/* ── 頁面切換 ── */
.page { display: none; }
.page.active { display: block; }
.hidden { display: none !important; }

/* ── 選文章頁 ── */
#selectPage { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
.select-hero { text-align: center; margin-bottom: 36px; }
.select-hero h2 { font-family: 'Orbitron', monospace; font-size: clamp(1.2rem,4vw,1.8rem); font-weight: 900; color: var(--accent); letter-spacing: 0.15em; margin-bottom: 8px; }
.select-hero p { font-size: 0.82rem; color: var(--muted); letter-spacing: 0.1em; }

/* 姓名輸入 */
.name-box { max-width: 460px; margin: 0 auto 20px; }
.name-box-inner { background: #fff; border: 2px solid var(--accent); border-radius: 12px; padding: 20px 24px; box-shadow: 0 4px 16px rgba(26,115,200,0.12); }
.name-label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
.name-row { display: flex; gap: 10px; }
.name-input { flex: 1; font-family: 'Noto Sans TC', sans-serif; font-size: 1.1rem; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; outline: none; color: var(--text); background: var(--bg); transition: border-color 0.2s; }
.name-input:focus { border-color: var(--accent); background: #fff; }
.name-confirm-btn { padding: 10px 20px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-family: 'Orbitron', monospace; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.name-confirm-btn:hover { background: #1060a0; }
.name-hint { font-size: 0.72rem; color: var(--muted); margin-top: 8px; }
.name-hint.ok  { color: var(--green); font-weight: 600; }
.name-hint.err { color: var(--red); }
.name-confirmed { max-width: 460px; margin: 0 auto 20px; display: flex; align-items: center; gap: 12px; background: #f0faf4; border: 1.5px solid var(--green); border-radius: 10px; padding: 10px 18px; }
.name-tag { font-size: 1rem; font-weight: 700; color: var(--green); flex: 1; }
.name-change-btn { font-size: 0.72rem; color: var(--muted); background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
.name-change-btn:hover { border-color: var(--accent); color: var(--accent); }

/* 文章卡片 */
.article-cards { display: flex; flex-direction: column; gap: 12px; }
.article-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 18px 22px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 16px; position: relative; overflow: hidden; }
.article-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); opacity: 0; transition: opacity 0.2s; }
.article-card:hover { border-color: var(--accent); background: #ddeef8; transform: translateX(4px); }
.article-card:hover::before { opacity: 1; }
.card-num { font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 900; color: var(--border2); min-width: 36px; text-align: center; flex-shrink: 0; }
.article-card:hover .card-num { color: var(--accent); }
.card-info { flex: 1; }
.card-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.card-preview { font-size: 0.77rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px; }
.card-lines { font-size: 0.68rem; color: var(--dim); font-family: 'Share Tech Mono', monospace; flex-shrink: 0; text-align: right; }

/* ── 打字練習頁 ── */
#typingPage { max-width: 860px; margin: 0 auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; }
.article-title-bar { display: flex; align-items: center; gap: 14px; }
.article-title-bar h2 { font-size: 1rem; font-weight: 700; color: var(--text); flex: 1; }
.btn-back { padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border2); background: transparent; color: var(--dim); font-size: 0.75rem; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; }
.btn-back:hover { border-color: var(--accent); color: var(--accent); }

/* 打字主區 */
.typing-arena { background: var(--panel); border: 1.5px solid var(--accent); border-radius: 10px; overflow: hidden; box-shadow: 0 4px 20px rgba(26,115,200,0.12); }
.done-lines { padding: 12px 20px 0; }
.done-line-row { display: flex; gap: 0; margin-bottom: 8px; opacity: 0.5; font-size: 1.05rem; line-height: 1.9; letter-spacing: 0.04em; }
.done-line-row .col-label { font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; color: var(--muted); width: 42px; flex-shrink: 0; padding-top: 4px; }
.done-chars { white-space: nowrap; overflow: hidden; }
.current-area { padding: 16px 20px; }
.current-line-label { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; font-family: 'Share Tech Mono', monospace; }

/* 對照框 */
.typing-pair { border: 2px solid var(--accent); border-radius: 10px; overflow: hidden; }
.row-label { width: 52px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', monospace; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; color: #fff; user-select: none; }
.target-row { display: flex; align-items: stretch; background: #fff4f2; border-bottom: 2px solid #f5d0c8; }
.target-row .row-label { background: #c0392b; }
.row-content { flex: 1; font-family: 'Noto Sans TC', sans-serif; font-size: 1.45rem; line-height: 2.1; letter-spacing: 0; padding: 14px 20px; white-space: nowrap; overflow: hidden; min-height: 64px; box-sizing: border-box; }

/* 目標字著色 */
.tc { position: relative; }
.tc.t-done   { color: #e8c0b0; }
.tc.t-cursor { color: #fff; background: #1565c0; border-radius: 3px; padding: 0 1px; font-weight: 900; }
.tc.t-ahead  { color: #c0392b; }
@keyframes blink-cur { 0%,100%{opacity:1}50%{opacity:0} }

/* 輸入行 */
.input-row-wrap { display: flex; align-items: stretch; background: #f8fcff; position: relative; }
.input-row-wrap .row-label { background: #27ae60; }
.type-input {
  flex: 1; font-family: 'Noto Sans TC', sans-serif; font-size: 1.45rem;
  line-height: 2.1; letter-spacing: 0; padding: 14px 20px;
  white-space: nowrap; overflow: hidden; min-height: 64px; box-sizing: border-box;
  background: transparent; border: none; outline: none; resize: none;
  color: #1a3a2a; caret-color: #27ae60;
}
.type-input::placeholder { color: #a8c8b8; font-size: 1rem; }
.enter-hint { position: absolute; right: 10px; bottom: 10px; font-size: 0.62rem; color: #80a898; font-family: 'Share Tech Mono', monospace; pointer-events: none; white-space: nowrap; }

/* 進度條 */
.line-progress { display: flex; align-items: center; gap: 10px; padding: 8px 20px 10px; }
.lp-text { font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; color: var(--muted); white-space: nowrap; }
.lp-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.lp-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 2px; transition: width 0.2s ease; }

/* 待打行預覽 */
.upcoming-lines { background: #f8fafd; border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; }
.upcoming-label { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; font-family: 'Share Tech Mono', monospace; }
.upcoming-line { font-size: 1.05rem; color: var(--border2); line-height: 1.8; white-space: nowrap; overflow: hidden; }
.upcoming-line:first-of-type { color: var(--dim); }

/* ── 結果頁 ── */
#resultPage { max-width: 680px; margin: 0 auto; padding: 40px 20px 60px; text-align: center; }
.result-card { background: #fff; border-radius: 20px; box-shadow: 0 8px 40px rgba(26,115,200,0.13); padding: 36px 32px 32px; margin-bottom: 24px; }
.result-school { font-size: 0.7rem; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.result-headline { font-family: 'Orbitron', monospace; font-size: clamp(1.1rem,3vw,1.5rem); font-weight: 900; color: var(--text); letter-spacing: 0.1em; margin-bottom: 6px; }
.result-subtitle { font-size: 0.82rem; color: var(--muted); margin-bottom: 28px; }
.result-article-name { font-size: 0.9rem; font-weight: 700; color: var(--accent); background: #e8f2fb; display: inline-block; padding: 4px 16px; border-radius: 20px; margin-bottom: 28px; }
.result-time-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px dashed var(--border); }
.result-time-icon { font-size: 1.6rem; }
.result-time-val { font-family: 'Orbitron', monospace; font-size: 2.4rem; font-weight: 900; color: var(--accent); letter-spacing: 0.08em; line-height: 1; }
.result-time-lbl { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.12em; margin-top: 2px; }
.result-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 0; }
@media(max-width:560px){.result-stats{grid-template-columns:repeat(2,1fr)}}
.stat-cell { border-radius: 12px; padding: 18px 10px 14px; position: relative; overflow: hidden; }
.stat-cell::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 12px 12px 0 0; }
.stat-cell.s-correct { background: #f0faf4; } .stat-cell.s-correct::before { background: var(--green); }
.stat-cell.s-wrong   { background: #fff0f2; } .stat-cell.s-wrong::before   { background: var(--red); }
.stat-cell.s-skip    { background: #fff8e8; } .stat-cell.s-skip::before    { background: var(--gold); }
.stat-cell.s-wpm     { background: #f3eeff; } .stat-cell.s-wpm::before     { background: #7b2fa0; }
.stat-icon { font-size: 1.3rem; margin-bottom: 6px; }
.stat-num { font-family: 'Orbitron', monospace; font-size: 1.7rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
.stat-cell.s-correct .stat-num { color: var(--green); }
.stat-cell.s-wrong   .stat-num { color: var(--red); }
.stat-cell.s-skip    .stat-num { color: #c07a00; }
.stat-cell.s-wpm     .stat-num { color: #7b2fa0; }
.stat-lbl { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.1em; }
.acc-bar-wrap { margin: 24px 0 0; text-align: left; }
.acc-bar-head { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); margin-bottom: 6px; }
.acc-bar-track { height: 10px; background: #e8eef5; border-radius: 99px; overflow: hidden; }
.acc-bar-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(.2,.8,.3,1); background: linear-gradient(90deg,var(--green),#00c8a0); }
.result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn-retry { padding: 13px 32px; border-radius: 8px; border: none; background: linear-gradient(135deg,var(--accent),#0060b0); color: #fff; font-family: 'Orbitron', monospace; font-weight: 700; font-size: 0.78rem; letter-spacing: 0.12em; cursor: pointer; transition: all 0.2s; }
.btn-retry:hover { transform: translateY(-2px); }
.btn-choose { padding: 13px 32px; border-radius: 8px; border: 1.5px solid var(--border2); background: transparent; color: var(--dim); font-family: 'Orbitron', monospace; font-size: 0.78rem; letter-spacing: 0.12em; cursor: pointer; transition: all 0.2s; }
.btn-choose:hover { border-color: var(--accent); color: var(--accent); }
.upload-status { text-align: center; padding: 16px; margin-bottom: 16px; border-radius: 10px; background: #f0f8ff; border: 1px solid var(--border); }
.upload-icon { font-size: 1.8rem; margin-bottom: 6px; }
.upload-msg { font-size: 0.85rem; font-weight: 500; }
.upload-msg.ok  { color: var(--green); }
.upload-msg.err { color: var(--red); font-size: 0.78rem; }
@keyframes fadeSlide { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeSlide 0.35s ease forwards; }
</style>
<script>
window.__ARTICLES__ = [{"id":1774328539427,"title":"我所知道的康橋","content":"這一帶是此邦中部的平原，地形像是海面的清\n波，默沈沈的起伏；山嶺是望不見的，有的是\n常青的草原與沃腴的田壤。登那土阜上望去，\n康橋只是一帶茂林，擁戴著幾處娉婷的尖閣。\n嫵媚的康河也望不見蹤跡，你只能循著那錦帶\n似的林木想像那一流清淺。村舍與樹林是這地\n盤上的棋子，有村舍有佳蔭，有佳蔭處有村舍\n。這早起是看炊煙的時辰；朝霧漸漸的升起，\n揭開了這灰蒼蒼的天幕，（最好是微霰後的光\n景）遠近的炊煙，成絲的，成縷的，成捲的，\n輕快的，遲重的，濃灰的，淡青的，慘白的，\n在靜定的朝氣裏漸漸的上騰，漸漸的不見彷彿\n是朝來人們的祈躊，參差的翳入了天聽。"},{"id":1774328763778,"title":"背影","content":"我們過了江，進了車站。我買票，他忙著照顧\n行李。行李太多了，得向腳夫行些小費，才可\n過去。他便又忙著和他們講價錢。我那時真是\n聰明過分，總覺他說話不大漂亮，非自己插嘴\n不可。但他終於講定了價錢；就送我上車。他\n給我揀定了靠車門的一張椅子；我將他給我做\n的紫毛大衣鋪好座位。他囑我路上小心，夜裏\n要警醒些，不要受涼。又囑託茶房好好照應我\n。我心裏暗笑他的迂；他們只認得錢，託他們\n直是白託！而且我這樣大年紀的人，難道還不\n能料理自己麼？唉，我現在想想，那時真是太\n聰明了！"},{"id":1776125759001,"title":"陋室銘","content":"陋室銘山不在高，有仙則名。水不在深，有龍\n則靈。斯是陋室，惟吾德馨。苔痕上階綠，草\n色入簾青。談笑有鴻儒，往來無白丁。可以調\n素琴，閱金經。無絲竹之亂耳，無案牘之勞形\n。南陽諸葛廬，西蜀子雲亭。孔子云：何陋之\n有？烏衣巷朱雀橋邊野草花，烏衣巷口夕陽斜\n。舊時王謝堂前燕，飛入尋常百姓家。石頭城\n山圍故國周遭在，潮打空城寂寞回。淮水東邊\n舊時月，夜深還過女牆來。"}];
window.__DEFAULT_TIMER__ = 10;
window.__GAS_URL__ = "https://script.google.com/macros/s/AKfycbwgDntJabp9bATOjukgmcnlhzQyD8MuXSzOE7NlTTq8pTbYYJL_Aru03AVBH9vRi93l/exec";
</script>

<body>

<!-- 頂欄 -->
<div class="topbar" id="topbar">
  <div class="logo">順安國中 文章速打測驗</div>
  <div class="topbar-stats hidden" id="practiceStats">
    <div class="top-stat">
      <span class="top-stat-label">剩餘／已用</span>
      <div class="big-timer" id="bigTimer">—</div>
    </div>
    <div class="top-stat" style="display:none"><div id="elapsedVal"></div></div>
    <div class="top-stat">
      <span class="top-stat-label">正確字數</span>
      <div class="top-stat-val green" id="correctVal">0</div>
    </div>
    <div class="top-stat">
      <span class="top-stat-label">正確率</span>
      <div class="top-stat-val green" id="accVal">—</div>
    </div>
    <div class="top-stat">
      <span class="top-stat-label">每分鐘字數</span>
      <div class="top-stat-val gold" id="wpmVal">—</div>
    </div>
    <div class="top-stat">
      <span class="top-stat-label">行數</span>
      <div class="top-stat-val" id="lineVal">0/0</div>
    </div>
    <button class="btn-end-top" onclick="endEarly()">⏹ 結束</button>
  </div>
</div>

<!-- ① 選文章頁 -->
<div class="page active" id="selectPage">
  <div class="select-hero">
    <h2>選擇練習文章</h2>
    <p>順安國中 · 文章速打測驗</p>
  </div>
  <div class="name-box" id="nameBox">
    <div class="name-box-inner">
      <label class="name-label">請先輸入姓名</label>
      <div class="name-row">
        <input type="text" class="name-input" id="nameInput" placeholder="例：王小明"
          maxlength="20" oninput="onNameInput()" onkeydown="if(event.key==='Enter')confirmName()">
        <button class="name-confirm-btn" onclick="confirmName()">確認 ›</button>
      </div>
      <div class="name-hint" id="nameHint">輸入姓名後才能開始練習</div>
    </div>
  </div>
  <div class="name-confirmed hidden" id="nameConfirmed">
    <span class="name-tag">👤 <span id="nameDisplay"></span></span>
    <button class="name-change-btn" onclick="changeName()">更改</button>
  </div>
  <div class="article-cards" id="articleCards"></div>
</div>

<!-- ② 打字練習頁 -->
<div class="page hidden" id="typingPage">
  <div class="article-title-bar">
    <button class="btn-back" onclick="goSelect()">← 返回</button>
    <h2 id="practiceTitle">—</h2>
    <span id="totalCharBadge" style="font-size:0.78rem;color:var(--accent);background:#e8f2fb;border:1px solid var(--border);padding:3px 10px;border-radius:20px;white-space:nowrap;"></span>
  </div>
  <div class="typing-arena" id="typingArena">
    <div class="done-lines" id="doneLines"></div>
    <div class="current-area">
      <div class="current-line-label">— 當前行 —</div>
      <div class="typing-pair">
        <div class="target-row">
          <div class="row-label">目標</div>
          <div class="row-content" id="targetRow"></div>
        </div>
        <div class="input-row-wrap">
          <div class="row-label">輸入</div>
          <textarea class="type-input" id="typeInput" rows="1"
            placeholder="開始打字…"
            spellcheck="false" autocomplete="off" autocorrect="off"
            oninput="handleInput()"
            onkeydown="handleKey(event)"></textarea>
          <span class="enter-hint" id="enterHint">打完按 ↵ Enter</span>
        </div>
      </div>
    </div>
    <div class="line-progress">
      <span class="lp-text" id="lpText">0 / 0 行完成</span>
      <div class="lp-bar"><div class="lp-fill" id="lpFill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="upcoming-lines" id="upcomingWrap">
    <div class="upcoming-label">▸ 接下來</div>
    <div id="upcomingLines"></div>
  </div>
</div>

<!-- ③ 結果頁 -->
<div class="page hidden" id="resultPage">
  <div class="result-card">
    <div class="result-school">順安國中 · 文章速打測驗</div>
    <div class="result-headline" id="resultTitle">練習完成！</div>
    <div class="result-subtitle" id="resultEmoji">🎉 恭喜完成本次測驗</div>
    <div class="result-article-name" id="resArticleName">—</div>
    <div class="result-time-row">
      <div class="result-time-icon">⏱</div>
      <div>
        <div class="result-time-val" id="resTime">—</div>
        <div class="result-time-lbl">TYPING TIME</div>
      </div>
    </div>
    <div class="result-stats">
      <div class="stat-cell s-correct"><div class="stat-icon">✅</div><div class="stat-num" id="resChars">—</div><div class="stat-lbl">正確字數</div></div>
      <div class="stat-cell s-wrong"><div class="stat-icon">❌</div><div class="stat-num" id="resWrong">—</div><div class="stat-lbl">錯誤字數</div></div>
      <div class="stat-cell s-skip"><div class="stat-icon">⏭</div><div class="stat-num" id="resSkip">—</div><div class="stat-lbl">未打字數</div></div>
      <div class="stat-cell s-wpm"><div class="stat-icon">⚡</div><div class="stat-num" id="resWpm">—</div><div class="stat-lbl">字／分鐘</div></div>
    </div>
    <div class="acc-bar-wrap">
      <div class="acc-bar-head"><span>正確率</span><span id="resAcc" style="font-weight:700;color:var(--accent);">—</span></div>
      <div class="acc-bar-track"><div class="acc-bar-fill" id="accBarFill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="upload-status" id="uploadStatus" style="display:none;">
    <div class="upload-icon" id="uploadIcon">⏳</div>
    <div class="upload-msg" id="uploadMsg">正在上傳成績…</div>
  </div>
  <div class="result-btns">
    <button class="btn-retry" onclick="retry()">↺ 重打此篇</button>
    <button class="btn-choose" onclick="goSelect()">← 選其他文章</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  資料初始化
// ══════════════════════════════════════════
let ARTICLES = [];
let DEFAULT_TIMER = 10;
let GAS_URL = window.__GAS_URL__ || 'https://script.google.com/macros/s/AKfycbwgDntJabp9bATOjukgmcnlhzQyD8MuXSzOE7NlTTq8pTbYYJL_Aru03AVBH9vRi93l/exec';
let studentName = '';

function initData() {
  const hash = location.hash;
  if (hash.startsWith('#data=')) {
    try {
      const raw = decodeURIComponent(escape(atob(hash.slice(6))));
      const d = JSON.parse(raw);
      ARTICLES = d.articles || [];
      DEFAULT_TIMER = d.timer ?? 10;
      return;
    } catch(e) { console.warn('hash error', e); }
  }
  if (window.__ARTICLES__) {
    ARTICLES = window.__ARTICLES__;
    DEFAULT_TIMER = window.__DEFAULT_TIMER__ ?? 10;
    return;
  }
  ARTICLES = [
    { title: '示範文章一：春天的早晨', content: '春風和煦，百花齊放，大地一片生機盎然。\n遠處山巒起伏，雲霧繚繞，景色如詩如畫。\n小溪流水潺潺，清澈見底，魚兒自由自在。\n鳥兒在枝頭歌唱，歌聲悅耳動聽，令人心曠神怡。\n這美好的一天，讓人忘卻一切煩憂，沉浸於自然之中。' },
    { title: '示範文章二：科技的力量', content: '科技改變了人類生活的方式，讓世界更加緊密相連。\n網際網路的出現，使資訊傳遞瞬間完成。\n人工智慧正在各個領域展現驚人的潛力。\n我們站在時代的浪潮之上，迎接每一個挑戰。\n唯有不斷學習，才能跟上這個快速變化的世界。' }
  ];
}

// ══════════════════════════════════════════
//  狀態變數
// ══════════════════════════════════════════
let chosenTimer = 10;
let currentArticle = null;
let lines = [];
let currentLine = 0;
let doneData = [];
let totalCorrect = 0;
let totalWrong = 0;
let totalTyped = 0;
let startTime = null;
let elapsedSec = 0;
let ticker = null;
let running = false;
let enterReady = false;
let isComposing = false;

// ══════════════════════════════════════════
//  斷行：20~25 字，優先標點後斷
// ══════════════════════════════════════════
const MIN_LINE = 20, MAX_LINE = 25;
function charWeight(ch) {
  return /[\u2E80-\u9FFF\uF900-\uFAFF\uFE30-\uFE4F\uFF00-\uFFEF\u3000-\u303F]/.test(ch) ? 1 : 0.5;
}
function isBreakPunct(ch) {
  return /[\u3002\uff01\uff1f\uff1b\uff0c\u3001\uff1a\u2026\u2014\uff5e\u300c\u300d\u300e\u300f\u3010\u3011]/.test(ch);
}
function breakArticle(content) {
  const fullText = content.split('\n').map(l=>l.trim()).filter(l=>l).join('');
  const result = [];
  let i = 0;
  while (i < fullText.length) {
    let cur = '', w = 0, lastPunctEnd = -1;
    while (i < fullText.length) {
      const ch = fullText[i];
      const cw = charWeight(ch);
      if (w + cw > MAX_LINE) break;
      cur += ch; w += cw; i++;
      if (isBreakPunct(ch) && w >= MIN_LINE) { lastPunctEnd = cur.length; }
      if (w >= MIN_LINE && isBreakPunct(ch)) break;
    }
    if (lastPunctEnd > 0 && lastPunctEnd < cur.length) {
      const extra = cur.slice(lastPunctEnd);
      cur = cur.slice(0, lastPunctEnd);
      i -= extra.length;
    }
    if (cur) result.push(cur);
  }
  return result;
}

// ══════════════════════════════════════════
//  選文章頁
// ══════════════════════════════════════════
function buildSelectPage() {
  chosenTimer = DEFAULT_TIMER;
  const cards = document.getElementById('articleCards');
  cards.innerHTML = ARTICLES.map((a, i) => {
    const preview = a.content.split('\n')[0];
    const lineCount = breakArticle(a.content).length;
    const charCount = a.content.split('\n').filter(l=>l.trim()).join('').length;
    return `<div class="article-card fade-in" style="animation-delay:${i*0.06}s" onclick="selectArticleGuard(${i})">
      <div class="card-num">${String(i+1).padStart(2,'0')}</div>
      <div class="card-info">
        <div class="card-title">${escHtml(a.title)}</div>
        <div class="card-preview">${escHtml(preview)}</div>
      </div>
      <div class="card-lines">${lineCount} 行 · ${charCount} 字</div>
    </div>`;
  }).join('');
}

// 姓名
function onNameInput() {
  const v = document.getElementById('nameInput').value.trim();
  const hint = document.getElementById('nameHint');
  if (v.length > 0) { hint.textContent = '✔ 準備好了！按「確認」開始選文章'; hint.className = 'name-hint ok'; }
  else { hint.textContent = '輸入姓名後才能開始練習'; hint.className = 'name-hint'; }
}
function confirmName() {
  const v = document.getElementById('nameInput').value.trim();
  if (!v) { const h = document.getElementById('nameHint'); h.textContent = '⚠ 請輸入姓名才能繼續'; h.className = 'name-hint err'; document.getElementById('nameInput').focus(); return; }
  studentName = v;
  document.getElementById('nameBox').classList.add('hidden');
  const conf = document.getElementById('nameConfirmed');
  conf.classList.remove('hidden');
  document.getElementById('nameDisplay').textContent = v;
}
function changeName() {
  studentName = '';
  document.getElementById('nameConfirmed').classList.add('hidden');
  document.getElementById('nameBox').classList.remove('hidden');
  document.getElementById('nameHint').textContent = '輸入姓名後才能開始練習';
  document.getElementById('nameHint').className = 'name-hint';
}
function selectArticleGuard(idx) {
  if (!studentName) {
    const h = document.getElementById('nameHint'); h.textContent = '⚠ 請先輸入姓名！'; h.className = 'name-hint err';
    document.getElementById('nameInput').focus();
    document.getElementById('nameBox').animate([{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:250});
    return;
  }
  startArticle(idx);
}

// ══════════════════════════════════════════
//  開始練習
// ══════════════════════════════════════════
function startArticle(idx) {
  currentArticle = ARTICLES[idx];
  lines = breakArticle(currentArticle.content);
  currentLine = 0;
  doneData = [];
  totalCorrect = 0; totalWrong = 0; totalTyped = 0; elapsedSec = 0;
  enterReady = false;
  isComposing = false;

  document.getElementById('practiceTitle').textContent = currentArticle.title;
  const totalChars = lines.join('').length;
  document.getElementById('totalCharBadge').textContent = '共 ' + totalChars + ' 字';

  showPage('typingPage');
  document.getElementById('practiceStats').classList.remove('hidden');

  const timerEl = document.getElementById('bigTimer');
  if (chosenTimer > 0) { timerEl.textContent = formatTime(chosenTimer * 60); timerEl.className = 'big-timer'; }
  else { timerEl.textContent = '∞'; }

  document.getElementById('lineVal').textContent = `0/${lines.length}`;
  renderDoneLines();
  renderCurrentLine();
  renderUpcoming();

  const inp = document.getElementById('typeInput');
  inp.value = '';
  inp.disabled = false;
  inp.style.background = 'transparent';
  inp.focus();

  startTime = null;
  running = true;
  clearInterval(ticker);
}

// ══════════════════════════════════════════
//  計時器
// ══════════════════════════════════════════
function tickTimer() {
  elapsedSec = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('elapsedVal').textContent = formatTime(elapsedSec);
  const timerEl = document.getElementById('bigTimer');
  if (chosenTimer > 0) {
    const rem = chosenTimer * 60 - elapsedSec;
    if (rem <= 0) { endGame(true); return; }
    timerEl.textContent = formatTime(rem);
    timerEl.className = 'big-timer' + (rem <= 30 ? ' danger' : rem <= 60 ? ' warn' : '');
  } else {
    timerEl.textContent = formatTime(elapsedSec);
  }
}
function formatTime(s) {
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// ══════════════════════════════════════════
//  輸入處理
// ══════════════════════════════════════════
function handleInput() {
  if (!running) return;
  if (isComposing) return;
  if (!startTime) {
    startTime = Date.now();
    ticker = setInterval(tickTimer, 500);
  }
  renderCurrentLine();
  updateStats();
}

document.addEventListener('compositionstart', () => { isComposing = true; });
document.addEventListener('compositionend', () => {
  isComposing = false;
  if (!running) return;
  if (!startTime) { startTime = Date.now(); ticker = setInterval(tickTimer, 500); }
  renderCurrentLine();
  updateStats();
});
document.addEventListener('selectionchange', () => {
  const inp = document.getElementById('typeInput');
  if (document.activeElement === inp && running && !isComposing) renderCurrentLine();
});

function handleKey(e) {
  if (!running) return;
  if (e.key === 'Enter') {
    e.preventDefault();
    const inp = document.getElementById('typeInput');
    const typed = inp.value;
    const target = lines[currentLine] || '';
    if (typed.length < target.length) {
      inp.animate([{transform:'translateX(-4px)'},{transform:'translateX(4px)'},{transform:'translateX(0)'}],{duration:200});
      enterReady = false;
      return;
    }
    if (!enterReady) {
      enterReady = true;
      showEnterHint(true);
      return;
    }
    enterReady = false;
    showEnterHint(false);
    if (currentLine >= lines.length) { endGame(false); return; }
    submitLine();
  } else {
    if (e.key !== 'Shift' && e.key !== 'Control' && e.key !== 'Alt' && e.key !== 'Meta') {
      enterReady = false;
      showEnterHint(false);
    }
  }
}

function showEnterHint(ready) {
  const hint = document.getElementById('enterHint');
  if (!hint) return;
  if (ready) { hint.textContent = '✔ 再按一次 ↵ 換下一行'; hint.style.color = 'var(--green)'; hint.style.fontWeight = '700'; }
  else { hint.textContent = '打完按 ↵ Enter'; hint.style.color = ''; hint.style.fontWeight = ''; }
}

function submitLine() {
  const inp = document.getElementById('typeInput');
  const typed = inp.value;
  const target = lines[currentLine];
  if (typed.length < target.length) return;

  let correct = 0, wrong = 0;
  for (let i = 0; i < target.length; i++) {
    if (isPunct(target[i])) continue;
    if (typed[i] === target[i]) correct++;
    else wrong++;
  }
  totalCorrect += correct;
  totalWrong += wrong;
  totalTyped += target.length;
  doneData.push({ typed, target, correct });

  currentLine++;
  inp.value = '';
  inp.style.height = 'auto';

  if (currentLine >= lines.length) {
    renderDoneLines();
    showFinishHint();
    inp.disabled = true;
    return;
  }
  renderDoneLines();
  renderCurrentLine();
  renderUpcoming();
  updateStats();
  showEnterHint(false);
  inp.focus();
}

function showFinishHint() {
  const hint = document.getElementById('enterHint');
  if (hint) { hint.textContent = '🎉 全部完成！再按 ↵ Enter 查看成績'; hint.style.color = 'var(--green)'; hint.style.fontWeight = '700'; }
  const inp = document.getElementById('typeInput');
  if (inp) inp.style.background = '#eafaf2';
}

// ══════════════════════════════════════════
//  渲染
// ══════════════════════════════════════════
function renderDoneLines() {
  const container = document.getElementById('doneLines');
  if (doneData.length === 0) { container.innerHTML = ''; return; }
  const recent = doneData.slice(-2);
  container.innerHTML = recent.map(d => {
    const chars = d.target.split('').map(ch => `<span>${escHtml(ch)}</span>`).join('');
    return `<div class="done-line-row"><span class="col-label">✓</span><span class="done-chars">${chars}</span></div>`;
  }).join('');
}

function renderCurrentLine() {
  const target = lines[currentLine] || '';
  const inp = document.getElementById('typeInput');
  const typed = inp.value;
  const cursorPos = inp.selectionStart ?? typed.length;
  const row = document.getElementById('targetRow');

  let html = '';
  target.split('').forEach((ch, i) => {
    let cls;
    if (i < typed.length) cls = 't-done';
    else if (i === cursorPos) cls = 't-cursor';
    else cls = 't-ahead';
    html += `<span class="tc ${cls}">${escHtml(ch)}</span>`;
  });
  if (row) row.innerHTML = html;
}

function renderUpcoming() {
  const upcoming = lines.slice(currentLine + 1, currentLine + 4);
  const wrap = document.getElementById('upcomingLines');
  if (upcoming.length === 0) { document.getElementById('upcomingWrap').style.display = 'none'; return; }
  document.getElementById('upcomingWrap').style.display = '';
  wrap.innerHTML = upcoming.map((l, i) => `<div class="upcoming-line" style="opacity:${1-i*0.3}">${escHtml(l)}</div>`).join('');
}

function updateStats() {
  const target = lines[currentLine] || '';
  const typed = document.getElementById('typeInput').value;
  let curCorrect = 0, curWrong = 0;
  for (let i = 0; i < Math.min(typed.length, target.length); i++) {
    if (isPunct(target[i])) continue;
    if (typed[i] === target[i]) curCorrect++;
    else curWrong++;
  }
  const tc = totalCorrect + curCorrect;
  const tw = totalWrong + curWrong;
  const typed_total = tc + tw;
  const acc = typed_total > 0 ? Math.round(tc / typed_total * 100) : 100;
  const wpm = elapsedSec > 0 ? Math.round(tc / elapsedSec * 60) : 0;
  document.getElementById('correctVal').textContent = tc;
  document.getElementById('accVal').textContent = acc + '%';
  document.getElementById('wpmVal').textContent = wpm;
  document.getElementById('lineVal').textContent = `${currentLine}/${lines.length}`;
  const pct = (currentLine / lines.length * 100).toFixed(0);
  document.getElementById('lpFill').style.width = pct + '%';
  document.getElementById('lpText').textContent = `${currentLine} / ${lines.length} 行完成`;
}

// ══════════════════════════════════════════
//  結束
// ══════════════════════════════════════════
function endEarly() { if (running) endGame(false); }

function endGame(timeUp) {
  running = false;
  clearInterval(ticker);

  const inp = document.getElementById('typeInput');
  const typed = inp.value;
  if (typed && currentLine < lines.length) {
    const target = lines[currentLine];
    let partCorrect = 0, partWrong = 0;
    for (let i = 0; i < Math.min(typed.length, target.length); i++) {
      if (isPunct(target[i])) continue;
      if (typed[i] === target[i]) partCorrect++;
      else partWrong++;
    }
    totalCorrect += partCorrect;
    totalWrong += partWrong;
  }

  const allText = lines.join('');
  const nonPunctTotal = allText.split('').filter(ch => !isPunct(ch)).length;
  const typed_total = totalCorrect + totalWrong;
  const skipped = Math.max(0, nonPunctTotal - typed_total);
  const acc = typed_total > 0 ? Math.round(totalCorrect / typed_total * 100) : 0;
  const wpm = elapsedSec > 0 ? Math.round(totalCorrect / elapsedSec * 60) : 0;

  document.getElementById('resultTitle').textContent = timeUp ? '時間到！' : '練習完成！';
  document.getElementById('resultEmoji').textContent = timeUp ? '⏰ 時間結束，以下是你的成績' : '🎉 恭喜完成本次測驗';
  document.getElementById('resArticleName').textContent = currentArticle ? currentArticle.title : '';
  document.getElementById('resTime').textContent = formatTime(elapsedSec);
  document.getElementById('resChars').textContent = totalCorrect;
  document.getElementById('resWrong').textContent = totalWrong;
  document.getElementById('resSkip').textContent = skipped;
  document.getElementById('resAcc').textContent = acc + '%';
  document.getElementById('resWpm').textContent = wpm;

  const accColor = acc >= 90 ? 'linear-gradient(90deg,var(--green),#00c8a0)' : acc >= 70 ? 'linear-gradient(90deg,#e8a010,#f0c030)' : 'linear-gradient(90deg,var(--red),#ff8060)';
  document.getElementById('resAcc').style.color = acc >= 90 ? 'var(--green)' : acc >= 70 ? '#c07a00' : 'var(--red)';
  setTimeout(() => { const fill = document.getElementById('accBarFill'); fill.style.background = accColor; fill.style.width = acc + '%'; }, 300);

  document.getElementById('practiceStats').classList.add('hidden');
  document.getElementById('uploadStatus').style.display = 'none';
  showPage('resultPage');

  const now = new Date();
  const dateStr = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0');
  const timeStr2 = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  uploadScore({ name: studentName||'（未填姓名）', article: currentArticle?currentArticle.title:'', date: dateStr, time: timeStr2, duration: formatTime(elapsedSec), correct: totalCorrect, wrong: totalWrong, skipped, acc: acc+'%', wpm, finished: timeUp?'未完成（時間到）':'完成' });
}

// ══════════════════════════════════════════
//  上傳成績
// ══════════════════════════════════════════
function uploadScore(data) {
  if (!GAS_URL) { setUploadStatus('skip','（未設定上傳網址）'); return; }
  setUploadStatus('loading','正在上傳成績…');
  fetch(GAS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) })
    .then(() => setUploadStatus('ok','✅ 成績已成功上傳到 Google 試算表！'))
    .catch(err => setUploadStatus('err','❌ 上傳失敗，請告知老師（' + err.message + '）'));
}
function setUploadStatus(type, msg) {
  const box = document.getElementById('uploadStatus');
  const icon = document.getElementById('uploadIcon');
  const msgEl = document.getElementById('uploadMsg');
  box.style.display = 'block';
  if (type==='loading'){icon.textContent='⏳';msgEl.className='upload-msg';}
  else if(type==='ok'){icon.textContent='☁️';msgEl.className='upload-msg ok';}
  else if(type==='err'){icon.textContent='⚠️';msgEl.className='upload-msg err';}
  else{icon.textContent='ℹ️';msgEl.className='upload-msg';}
  msgEl.textContent = msg;
}

// ══════════════════════════════════════════
//  導航
// ══════════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.classList.add('hidden'); });
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  el.classList.add('active');
}
function goSelect() {
  running = false; clearInterval(ticker);
  document.getElementById('practiceStats').classList.add('hidden');
  showPage('selectPage');
  buildSelectPage();
  if (studentName) {
    document.getElementById('nameBox').classList.add('hidden');
    document.getElementById('nameConfirmed').classList.remove('hidden');
    document.getElementById('nameDisplay').textContent = studentName;
  }
}
function retry() {
  const idx = ARTICLES.indexOf(currentArticle);
  startArticle(idx < 0 ? 0 : idx);
}

// ══════════════════════════════════════════
//  工具
// ══════════════════════════════════════════
function isPunct(ch) {
  return /[\u3000-\u303F\uFF00-\uFFEF\u2000-\u206F\uff0c\u3002\uff01\uff1f\uff1b\uff1a\u300c\u300d\u300e\u300f\u3010\u3011\u3014\u3015\u3001\u2026\u2014\uff5e\u00b7.,!?;:'"\/\-\(\)\[\]{}@#$%^&*+=<>~`]/.test(ch);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════
//  啟動
// ══════════════════════════════════════════
initData();
buildSelectPage();
</script>
</body>
</html>
